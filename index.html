    <style>
      html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    </style>
    <script>
      window.onerror = function(msg, src, line) {
        document.body.style.cssText = "background:#1a0a2e;color:#fff;padding:24px;font-family:monospace;";
        document.body.innerHTML = '<h2 style="color:#f87171">AturDuitku Error</h2>'
          + '<p style="color:#fca5a5;margin:8px 0">' + msg + "</p>"
          + '<p style="color:#888;font-size:12px">' + src + " line:" + line + "</p>"
          + '<button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#6d28d9;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px">Muat Ulang</button>';
        return false;
      };
      window.addEventListener("unhandledrejection", function(e) {
        console.error("Unhandled promise rejection:", e.reason);
      });
    </script>
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then((reg) => {
              console.log("SW registered:", reg.scope);
              reg.update && reg.update();
            })
            .catch((err) => console.log("SW error:", err));
        });
      }
    </script>
  </body>
