    <style>
      html {
        min-height: 100%;
        background: #160522;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 50% 18%, rgba(124,58,237,.42), transparent 34%),
          linear-gradient(135deg, #2E1065 0%, #160522 58%, #0B0612 100%);
        color: #fff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #root {
        min-height: 100vh;
        background:
          radial-gradient(circle at 50% 18%, rgba(124,58,237,.42), transparent 34%),
          linear-gradient(135deg, #2E1065 0%, #160522 58%, #0B0612 100%);
      }
      .boot-splash {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: max(24px, env(safe-area-inset-top)) max(22px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(22px, env(safe-area-inset-left));
        text-align: center;
      }
      .boot-logo {
        width: 86px;
        height: 86px;
        border-radius: 24px;
        object-fit: cover;
        box-shadow: 0 20px 52px rgba(124,58,237,.46);
        animation: bootFloat 1.7s ease-in-out infinite;
      }
      .boot-title {
        font-size: 22px;
        font-weight: 900;
        letter-spacing: -.4px;
      }
      .boot-subtitle {
        color: #DDD6FE;
        font-size: 13px;
        font-weight: 700;
      }
      .boot-bar {
        width: min(210px, 58vw);
        height: 7px;
        border-radius: 999px;
        background: rgba(255,255,255,.14);
        border: 1px solid rgba(255,255,255,.12);
        overflow: hidden;
      }
      .boot-bar::before {
        content: "";
        display: block;
        width: 76px;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, #C4B5FD, transparent);
        animation: bootLoad 1.1s ease-in-out infinite;
      }
      .boot-note {
        color: #A78BFA;
        font-size: 11px;
        font-weight: 700;
      }
      .boot-help {
        display: none;
        color: #C4B5FD;
        font-size: 11px;
        line-height: 1.55;
        max-width: 260px;
      }
      .boot-reload {
        margin-top: 2px;
        padding: 8px 13px;
        border: 1px solid rgba(255,255,255,.16);
        border-radius: 999px;
        background: rgba(255,255,255,.08);
        color: #fff;
        font: inherit;
        font-size: 11px;
        font-weight: 800;
        cursor: pointer;
      }
      .boot-splash.is-slow .boot-help {
        display: block;
      }
      @keyframes bootFloat {
        0%,100% { transform: translateY(0) rotate(-2deg); }
        50% { transform: translateY(-9px) rotate(2deg); }
      }
      @keyframes bootLoad {
        from { transform: translateX(-100%); }
        to { transform: translateX(280%); }
      }
    </style>
    <script>
      window.onerror = function(msg, src, line) {
        if (!document.body) return false;
        document.body.style.cssText = "background:#1a0a2e;color:#fff;padding:24px;font-family:monospace;";
        document.body.innerHTML = '<h2 style="color:#f87171">AturDuitku Error</h2>'
          + '<p style="color:#fca5a5;margin:8px 0">' + msg + "</p>"
          + '<p style="color:#888;font-size:12px">' + src + " line:" + line + "</p>"
          + '<button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#6d28d9;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px">Muat Ulang</button>';
        return false;
      };
      window.addEventListener("unhandledrejection", function(e) {
        console.error("Unhandled promise rejection:", e.reason);
      });
    </script>
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body>
    <div id="root">
      <div class="boot-splash">
        <img class="boot-logo" src="/icon-192.png?v=rp-cat-20260707" alt="AturDuitku" />
        <div class="boot-title">AturDuitku</div>
        <div class="boot-subtitle">Menyiapkan dashboard keuanganmu...</div>
        <div class="boot-bar" aria-hidden="true"></div>
        <div class="boot-note">Sinkronisasi cloud berjalan otomatis</div>
        <div class="boot-help">
          Kalau lebih dari beberapa detik, cek koneksi atau muat ulang halaman.
          <br />
          <button class="boot-reload" onclick="location.reload()">Muat ulang</button>
        </div>
      </div>
    </div>
    <script>
      setTimeout(function () {
        var splash = document.querySelector(".boot-splash");
        if (splash) splash.classList.add("is-slow");
      }, 8000);
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then((reg) => {
              console.log("SW registered:", reg.scope);
              reg.update && reg.update();
            })
            .catch((err) => console.log("SW error:", err));
        });
      }
    </script>
  </body>
</html>
